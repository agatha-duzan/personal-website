	<style>
		@media (max-width: 1024px) {

		@media (min-width: 768px) {

		}
		#fh5co-logo img:hover {

		}

		/* Clear the fixed nav on desktop (mobile override is above) */
		#fh5co-fullgallery { padding: 10em 0 6em; }

		/* Intro line, styled like the "Some of my art…" line on the main
		   Gallery page: regular body font, left-aligned. */
		.fullgallery-intro {
			margin: 0 0 1.6em;
			text-align: left;
			font-size: clamp(1.3rem, 2.55vw, 1.6rem);
			color: #4a3f30;
		}
		.fullgallery-intro a {
			color: #4a3f30;
			text-decoration: underline;
			text-underline-offset: 3px;
			transition: color 0.25s ease;
		}
		.fullgallery-intro a:hover,
		.fullgallery-intro a:focus { color: #ff0080e6; }

		/* ============================================================
		   FULL GALLERY — simple Pinterest-style masonry board.
		   Masonry via CSS columns: equal-width columns, images flow
		   top-to-bottom and pack tightly. Each image keeps its native
		   aspect ratio (width:100%; height:auto) — never cropped.
		   ============================================================ */
		.masonry {
			column-count: 5;
			column-gap: 14px;
			margin-top: 2.5em;
		}
		.masonry .m-item {
			break-inside: avoid;          /* don't split an image across columns */
			-webkit-column-break-inside: avoid;
			page-break-inside: avoid;
			margin: 0 0 14px;
		}
		.masonry img {
			display: block;
			width: 100%;                  /* fill the column width */
			height: auto;                 /* height follows the native ratio */
			border-radius: 3px;
			/* Faint edge so light/white-background pieces don't vanish into the
			   white page. Subtle enough to still read as plain rectangles. */
			box-shadow: 0 1px 5px rgba(0,0,0,0.14);
		}

		/* 4–5 desktop · 2–3 tablet · 1–2 mobile */
		@media (max-width: 1200px) { .masonry { column-count: 4; } }
		@media (max-width: 900px)  { .masonry { column-count: 3; } }
		@media (max-width: 600px)  { .masonry { column-count: 2; column-gap: 10px; } .masonry .m-item { margin-bottom: 10px; } }
		@media (max-width: 380px)  { .masonry { column-count: 1; } }

		.fullgallery-empty {
			margin-top: 2em;
			text-align: center;
			color: #999;
		}
	</style>

	<!-- Image list, auto-generated by scripts/gen-full-gallery.sh -->
	<script src="images/full_gallery/manifest.js"></script>
	<script>
	(function () {
		var IMAGES = window.FULL_GALLERY || [];
		var board = document.getElementById('masonry');

		if (!IMAGES.length) {
			board.innerHTML = '<p class="fullgallery-empty">No images yet — add them to <code>images/full_gallery/</code> and run <code>scripts/gen-full-gallery.sh</code>.</p>';
			return;
		}

		IMAGES.forEach(function (name) {
			var item = document.createElement('div');
			item.className = 'm-item';
			var img = document.createElement('img');
			img.src = 'images/full_gallery/web/' + name;
			img.alt = '';
			img.loading = 'lazy';          // stay fast on mobile
			img.decoding = 'async';
			item.appendChild(img);
			board.appendChild(item);
		});
	})();
	</script>
